services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orguser
      POSTGRES_PASSWORD: orgpass123
      POSTGRES_DB: orgstructure
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orguser -d orgstructure"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://orguser:orgpass123@db:5432/orgstructure
      SYNC_DATABASE_URL: postgresql://orguser:orgpass123@db:5432/orgstructure
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
